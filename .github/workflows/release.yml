name: Release HEXSTACK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        type: string
      create_release:
        description: Create or update a GitHub release
        required: true
        default: true
        type: boolean
      notarize_macos:
        description: Sign and notarize macOS installer (requires Apple secrets)
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PRODUCT_NAME: HEXSTACK

jobs:
  build-windows:
    name: Build Windows installer (.exe)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release tag
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ inputs.tag }}'
          } else {
            $tag = '${{ github.ref_name }}'
          }
          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          $version = $tag -replace '^v', ''
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: |
          cmake --build build --config Release --target Hexstack_Standalone
          cmake --build build --config Release --target Hexstack_VST3

      - name: Stage artifacts for Inno Setup
        shell: pwsh
        run: |
          $vst3Src = 'build\Hexstack_artefacts\Release\VST3\HEXSTACK.vst3'
          $exeSrc  = 'build\Hexstack_artefacts\Release\Standalone\HEXSTACK.exe'

          if (!(Test-Path $vst3Src)) { throw "VST3 bundle not found at $vst3Src" }
          if (!(Test-Path $exeSrc))  { throw "Standalone exe not found at $exeSrc" }

          New-Item -ItemType Directory -Force -Path 'installer-staging\VST3\HEXSTACK.vst3' | Out-Null
          New-Item -ItemType Directory -Force -Path 'installer-staging\Standalone'          | Out-Null

          Copy-Item -Recurse -Force "$vst3Src\*" 'installer-staging\VST3\HEXSTACK.vst3\'
          Copy-Item -Force $exeSrc 'installer-staging\Standalone\HEXSTACK.exe'

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path 'release' | Out-Null
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          & $iscc 'installers\windows\hexstack.iss' "/DMyAppVersion=$env:VERSION"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed (exit $LASTEXITCODE)" }
          $built = Get-ChildItem 'release\HEXSTACK-Windows-*-Setup.exe' | Select-Object -First 1
          if (!$built) { throw "Installer .exe not found in release\" }
          Write-Output "Installer built: $($built.Name)"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: HEXSTACK-windows-release
          path: release/HEXSTACK-Windows-*-Setup.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS installer (.pkg)
    runs-on: macos-14
    env:
      APPLE_DEV_ID_APP_CERT_P12_BASE64: ${{ secrets.APPLE_DEV_ID_APP_CERT_P12_BASE64 }}
      APPLE_DEV_ID_APP_CERT_PASSWORD:   ${{ secrets.APPLE_DEV_ID_APP_CERT_PASSWORD }}
      APPLE_ID:                         ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD:      ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID:                    ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          echo "RELEASE_TAG=${tag}" >> "$GITHUB_ENV"
          version="${tag#v}"
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Generate .icns from AMP.png
        shell: bash
        run: |
          mkdir -p AMP.iconset
          sips -z 16   16   AMP.png --out AMP.iconset/icon_16x16.png
          sips -z 32   32   AMP.png --out AMP.iconset/icon_16x16@2x.png
          sips -z 32   32   AMP.png --out AMP.iconset/icon_32x32.png
          sips -z 64   64   AMP.png --out AMP.iconset/icon_32x32@2x.png
          sips -z 128  128  AMP.png --out AMP.iconset/icon_128x128.png
          sips -z 256  256  AMP.png --out AMP.iconset/icon_128x128@2x.png
          sips -z 256  256  AMP.png --out AMP.iconset/icon_256x256.png
          sips -z 512  512  AMP.png --out AMP.iconset/icon_256x256@2x.png
          sips -z 512  512  AMP.png --out AMP.iconset/icon_512x512.png
          sips -z 1024 1024 AMP.png --out AMP.iconset/icon_512x512@2x.png
          iconutil -c icns AMP.iconset -o AMP.icns
          echo "Generated AMP.icns"

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DHEXSTACK_MACOS_ICNS="${GITHUB_WORKSPACE}/AMP.icns"

      - name: Build
        run: |
          cmake --build build --config Release --target Hexstack_Standalone
          cmake --build build --config Release --target Hexstack_VST3
          cmake --build build --config Release --target Hexstack_AU

      - name: Collect macOS deliverables
        shell: bash
        run: |
          mkdir -p release/macos

          standalone_path=$(find build -type d -path '*/Standalone/HEXSTACK.app'  | head -n 1)
          vst3_path=$(      find build -type d -path '*/VST3/HEXSTACK.vst3'       | head -n 1)
          au_path=$(        find build -type d -path '*/AU/HEXSTACK.component'    | head -n 1)

          echo "Standalone : ${standalone_path}"
          echo "VST3       : ${vst3_path}"
          echo "AU         : ${au_path}"

          test -n "${standalone_path}" || { echo "Standalone not found"; find build -maxdepth 6 | sort; exit 1; }
          test -n "${vst3_path}"       || { echo "VST3 not found";       find build -maxdepth 6 | sort; exit 1; }
          test -n "${au_path}"         || { echo "AU not found";         find build -maxdepth 6 | sort; exit 1; }

          cp -R "${standalone_path}" release/macos/
          cp -R "${vst3_path}"       release/macos/
          cp -R "${au_path}"         release/macos/

      - name: Import Developer ID certificate
        if: >
          (github.event_name != 'workflow_dispatch' || inputs.notarize_macos) &&
          env.APPLE_DEV_ID_APP_CERT_P12_BASE64 != '' &&
          env.APPLE_DEV_ID_APP_CERT_PASSWORD   != ''
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/hexstack-signing.keychain-db"
          KEYCHAIN_PASSWORD="hexstack-temporary-keychain"

          echo "$APPLE_DEV_ID_APP_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_DEV_ID_APP_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CODE_SIGN_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F '"' '/Developer ID Application/ { print $2; exit }')
          test -n "$CODE_SIGN_IDENTITY" || { echo "No Developer ID Application identity found"; exit 1; }

          echo "CODE_SIGN_IDENTITY=$CODE_SIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"           >> "$GITHUB_ENV"

      - name: Sign macOS bundles
        if: >
          (github.event_name != 'workflow_dispatch' || inputs.notarize_macos) &&
          env.APPLE_DEV_ID_APP_CERT_P12_BASE64 != '' &&
          env.APPLE_DEV_ID_APP_CERT_PASSWORD   != ''
        shell: bash
        run: |
          for bundle in release/macos/HEXSTACK.app release/macos/HEXSTACK.vst3 release/macos/HEXSTACK.component; do
            xattr -cr "$bundle"
            chmod -R u+w "$bundle"
            codesign --force --deep --options runtime --timestamp \
              --sign "$CODE_SIGN_IDENTITY" "$bundle"
            codesign --verify --verbose=2 "$bundle"
          done

      - name: Notarize and staple macOS bundles
        if: >
          (github.event_name != 'workflow_dispatch' || inputs.notarize_macos) &&
          env.APPLE_DEV_ID_APP_CERT_P12_BASE64 != '' &&
          env.APPLE_DEV_ID_APP_CERT_PASSWORD   != '' &&
          env.APPLE_ID                         != '' &&
          env.APPLE_APP_SPECIFIC_PASSWORD      != '' &&
          env.APPLE_TEAM_ID                    != ''
        shell: bash
        run: |
          NOTARY_PROFILE="hexstack-notary-profile"
          NOTARY_ZIP="$RUNNER_TEMP/HEXSTACK-macos-notary.zip"

          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

          ditto -c -k --keepParent release/macos "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" --keychain-profile "$NOTARY_PROFILE" --wait

          xcrun stapler staple release/macos/HEXSTACK.app
          xcrun stapler staple release/macos/HEXSTACK.vst3
          xcrun stapler staple release/macos/HEXSTACK.component

      - name: Build macOS installer package
        shell: bash
        run: |
          version="$VERSION"
          mkdir -p pkg-staging/vst3/Library/Audio/Plug-Ins/VST3
          mkdir -p pkg-staging/au/Library/Audio/Plug-Ins/Components
          mkdir -p pkg-staging/standalone/Applications
          mkdir -p pkg-components

          cp -R release/macos/HEXSTACK.vst3      pkg-staging/vst3/Library/Audio/Plug-Ins/VST3/
          cp -R release/macos/HEXSTACK.component  pkg-staging/au/Library/Audio/Plug-Ins/Components/
          cp -R release/macos/HEXSTACK.app        pkg-staging/standalone/Applications/

          pkgbuild --root pkg-staging/vst3 \
                   --identifier com.inferoplugins.hexstack.vst3 \
                   --version "$version" \
                   pkg-components/HEXSTACK-vst3.pkg

          pkgbuild --root pkg-staging/au \
                   --identifier com.inferoplugins.hexstack.au \
                   --version "$version" \
                   pkg-components/HEXSTACK-au.pkg

          pkgbuild --root pkg-staging/standalone \
                   --identifier com.inferoplugins.hexstack.standalone \
                   --version "$version" \
                   pkg-components/HEXSTACK-standalone.pkg

          productbuild \
            --distribution installers/macos/distribution.xml \
            --package-path  pkg-components \
            --version       "$version" \
            "release/HEXSTACK-macOS-${version}.pkg"

          echo "Built: release/HEXSTACK-macOS-${version}.pkg"

      - name: Upload macOS installer
        uses: actions/upload-artifact@v7
        with:
          name: HEXSTACK-macos-release
          path: release/HEXSTACK-macOS-*.pkg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs:
      - build-windows
      - build-macos
    if: ${{ github.event_name == 'push' || inputs.create_release }}
    runs-on: ubuntu-latest

    steps:
      - name: Download installers
        uses: actions/download-artifact@v5
        with:
          pattern: HEXSTACK-*-release
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          ls -la release-assets

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG exists — uploading refreshed installers."
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "HEXSTACK $RELEASE_TAG" \
              --generate-notes
          fi

          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            release-assets/* \
            --clobber
