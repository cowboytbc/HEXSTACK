name: Build macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger a build manually from GitHub

jobs:
  build-macos:
    runs-on: macos-14   # Apple Silicon (M1) runner

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Xcode ───────────────────────────────────────────────────────────────
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── Configure ───────────────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -B build -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DHEXSTACK_COPY_PLUGIN_AFTER_BUILD=ON \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      # ── Build (VST3 + Standalone + AU) ──────────────────────────────────────
      - name: Build Release
        run: |
          cmake --build build --config Release \
            --target Hexstack_VST3 Hexstack_AU Hexstack_Standalone \
            -- -jobs 4

      # ── Collect binaries ─────────────────────────────────────────────────────
      - name: Collect binaries
        run: |
          mkdir -p pkg_root/VST3
          mkdir -p pkg_root/AU
          mkdir -p pkg_root/Standalone

          # Prefer DELIVERABLES copies (post-build copy), fall back to artefacts dir
          VST3=$(find DELIVERABLES/macOS/VST3 -name "*.vst3" -maxdepth 1 2>/dev/null | head -1)
          AU=$(find DELIVERABLES/macOS/AU -name "*.component" -maxdepth 1 2>/dev/null | head -1)
          APP=$(find DELIVERABLES/macOS/Standalone -name "*.app" -maxdepth 1 2>/dev/null | head -1)

          [ -z "$VST3" ] && VST3=$(find build/Hexstack_artefacts/Release -name "*.vst3" | head -1)
          [ -z "$AU"   ] && AU=$(find build/Hexstack_artefacts/Release -name "*.component" | head -1)
          [ -z "$APP"  ] && APP=$(find build/Hexstack_artefacts/Release -name "HEXSTACK.app" | head -1)

          echo "VST3:       $VST3"
          echo "AU:         $AU"
          echo "Standalone: $APP"

          cp -R "$VST3" pkg_root/VST3/
          cp -R "$AU"   pkg_root/AU/
          cp -R "$APP"  pkg_root/Standalone/

      # ── Build component packages ─────────────────────────────────────────────
      - name: Build component .pkg files
        run: |
          mkdir -p component_pkgs

          # VST3  →  /Library/Audio/Plug-Ins/VST3/
          pkgbuild \
            --root pkg_root/VST3 \
            --install-location "/Library/Audio/Plug-Ins/VST3" \
            --identifier com.infernotones.hexstack.vst3 \
            --version 1.0 \
            component_pkgs/HEXSTACK-vst3.pkg

          # AU  →  /Library/Audio/Plug-Ins/Components/
          pkgbuild \
            --root pkg_root/AU \
            --install-location "/Library/Audio/Plug-Ins/Components" \
            --identifier com.infernotones.hexstack.au \
            --version 1.0 \
            component_pkgs/HEXSTACK-au.pkg

          # Standalone  →  /Applications/
          pkgbuild \
            --root pkg_root/Standalone \
            --install-location "/Applications" \
            --identifier com.infernotones.hexstack.standalone \
            --version 1.0 \
            component_pkgs/HEXSTACK-standalone.pkg

      # ── Assemble final installer .pkg ────────────────────────────────────────
      - name: Assemble installer
        run: |
          mkdir -p installer_out

          productbuild \
            --distribution installers/macos/distribution.xml \
            --package-path component_pkgs \
            --resources installers/macos \
            installer_out/HEXSTACK_Installer_v1.0_macOS.pkg

          echo "── installer ──"
          ls -lh installer_out/

      # ── Upload installer as GitHub Actions artifact ──────────────────────────
      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: HEXSTACK-macOS-Installer-${{ github.sha }}
          path: installer_out/HEXSTACK_Installer_v1.0_macOS.pkg
          retention-days: 90
